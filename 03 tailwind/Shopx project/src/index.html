<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopx</title>
  <link href="./output.css" rel="stylesheet">
</head>


<body class="bg-gray-100 font-sans">

    <nav class="shadow sticky top-0 z-50 bg-white">
        <div class="container mx-auto py-4 flex justify-around items-center">
            <!--Shopx text-->
            <h1 class="text-blue-700 font-extrabold text-2xl">ShopX</h1>
        
            <!--nav link-->
            <div class="flex gap-6">
                <a href="#" class="hover:text-blue-700 transition">Home</a>
                <a href="#" class="hover:text-blue-700 transition">Product</a>
                <a href="#" class="hover:text-blue-700 transition">Features</a>
                <a href="#" class="hover:text-blue-700 transition">Contacts</a>
            </div>
        
            <!--login button-->
            <button class="bg-blue-600 hover:bg-blue-700  hover:scale-105 transition rounded-md py-2 px-5 text-white ring-2 ring-blue-300">Login</button>
        </div>
    </nav>

    <!--Hero section-->
    <section class="border-2 min-h-screen py-6 bg-linear-to-r from-blue-600 to-indigo-800 text-white flex justify-center items-center">
        <!--Parent-->
        <div class="grid grid-cols-2 gap-10 px-20 py-4 place-items-center ">
            <!--First section-->
            <div>
                <p class="uppercase text-blue-300 tracking-widest">New Collection</p>

                <h2 class="mt-4 text-6xl font-extrabold">Modern Products for Everyday Life</h2>

                <p class="mt-4 text-lgn text-blue-300">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Vero modi laborum iure quisquam atque magnam!</p>
               
               
                <div class="mt-6 flex gap-4">
                    <button class="bg-white text-blue-500 px-6 py-3 rounded-xl font-bold hover:scale-105 transition">Buy Now</button>
                    <button class="bg-transparent text-blue-300 px-6 py-3 rounded-xl font-bold hover:scale-105 transition border-2 ring-white">Learn More</button>
                </div>
            </div>
            
            <!--Second section-->
           <div class="w-85 h-110 rounded-lg flex items-center justify-center">
            <img class="rounded-2xl object-cover h-full rotate-3" src="./images/ShopX - Hero.jpg" alt="Hero">
           </div>
        </div>
        
    </section>
</body>
</html>
